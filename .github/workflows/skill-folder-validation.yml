name: Skill Folder Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill folders
        shell: pwsh
        run: ./scripts/Validate-SkillFolders.ps1 -FailOnIssues
